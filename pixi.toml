[workspace]
name = "sonata"
version = "0.1.0"
description = "Multi-Model Mojo/C++/Python Song Analysis Tool"
readme = "README.md"
channels = ["https://conda.modular.com/max/", "conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[system-requirements]
libc = { version = "2.34" }

[dependencies]
# Pixi fetches these via Conda ecosystem (C++ compilers & optomized binaries)
python = ">=3.11"
librosa = ">=0.11.0"
numpy = ">=2.1.3"
pandas = ">=2.3.1"
scikit-learn = ">=1.7.1"
streamlit = ">=1.47.1"
pytorch = ">=2.0.0"
jupyter = ">=1.0.0"
cmake = ">=3.20"
cxx-compiler = ">=1.0" # provisions gcc/clang toolchains
mojo = "*"

[pypi-dependencies]